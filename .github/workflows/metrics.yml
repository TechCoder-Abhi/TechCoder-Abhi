name: GitHub Metrics

on:
  schedule:
    - cron: "0 18 * * *"   # once per day
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Git Identity
        run: |
          git config --global user.name "TechCoder-Abhi"
          git config --global user.email "abhijitmondalworld@gmail.com"

      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: TechCoder-Abhi

          template: classic
          base: header, activity, community, repositories

          config_timezone: Asia/Kolkata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_charts: yes

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          plugin_achievements: yes
          plugin_achievements_threshold: C

          plugin_topics: yes
          plugin_topics_limit: 15

          plugin_projects: yes
          plugin_projects_limit: 4

          plugin_lines: yes
          plugin_stars: yes

      - name: Commit & Push
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit --author="TechCoder-Abhi abhijitmondalworld@gmail.com" -m "chore: update github metrics"
            git push
          fi
