
name: GitHub Metrics

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git Identity
        run: |
          git config --global user.name "TechCoder-Abhi"
          git config --global user.email "abhijitmondalworld@gmail.com"

      - name: Generate Main Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: TechCoder-Abhi
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Kolkata
          config_display: large
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_lines: yes
          plugin_stars: yes
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_isocalendar: no

      - name: Generate LeetCode Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.leetcode.svg
          token: NOT_NEEDED
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: Abhijit_Codes
          plugin_leetcode_sections: solved, skills, recent

      - name: Commit & Push
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update github metrics"
            git push
          fi
