name: Auto Commit

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update activity log
        run: |
          echo "- Worked on repo at $(date)" >> activity.log

      - name: Commit & Push
        run: |
          git config user.name "TechCoder-Abhi"
          git config user.email "abhijitmondalworld@gmail.com"
          
          git add .

          messages=(
            "chore: update activity log"
            "docs: update progress"
            "refactor: minor cleanup"
            "feat: small improvement"
            "chore: maintain repository"
          )

          msg=${messages[$RANDOM % ${#messages[@]}]}

          git commit -m "$msg" || echo "no changes"
          git push
