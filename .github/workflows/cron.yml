name: Auto Commit

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make changes
        run: |
          echo "Update $(date)" >> data.txt

      - name: Commit & Push
        run: |
          git config user.name "TechCoder-Abhi"
          git config user.email "abhijitmondalworld@gmail.com"
          git add .
          git commit -m "generated"
          git push
